<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index,follow">
<title>Finify — Privacy-first subscription tracking</title>
<meta name="description" content="Finify helps you track subscriptions, manage budgets, and understand recurring spending — without storing your raw financial data.">
<style>
:root{--bg:#0F0F23;--surface:#16162A;--text:#F4F4F8;--text2:#B6B6C6;--muted:#7A7A8C;--accent:#8A6CFF;--border:rgba(255,255,255,.08)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text2);font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:72px 22px 80px;text-align:center}
.logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#8A6CFF,#5B3CCB);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:32px;margin:0 auto 22px}
h1{color:var(--text);font-size:34px;margin:0 0 10px}
.tag{font-size:18px;color:var(--text2);max-width:540px;margin:0 auto 28px}
.links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.links a{color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 18px;text-decoration:none;font-size:15px}
.links a:hover{border-color:var(--accent);color:#fff}
.email{margin-top:26px;font-size:14px;color:var(--muted)}
.email a{color:var(--accent);text-decoration:none}
footer{margin-top:60px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
<div class="logo">F</div>
<h1>Finify</h1>
<p class="tag">Privacy-first subscription tracking. See every recurring payment, manage your budget, and understand your spending &mdash; without giving up your financial privacy.</p>
<div class="links">
<a href="/privacy">Privacy Policy</a>
<a href="/terms">Terms of Service</a>
<a href="/support">Support</a>
</div>
<p class="email">Questions? <a href="mailto:support@finify.app">support@finify.app</a></p>
<footer>&copy; 2026 Finify. All rights reserved.</footer>
</div>
</body>
</html>
