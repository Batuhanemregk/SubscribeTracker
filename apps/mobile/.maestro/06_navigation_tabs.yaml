appId: host.exp.Exponent
---
# Test 06: Tab Navigation
# Using coordinate-based taps for bottom tab bar (React Navigation tabs)
# Bottom tab bar positions on iPhone (5 tabs): ~10%, 30%, 50%, 70%, 90% horizontally, ~97% vertically

- openLink: "exp://127.0.0.1:8081"
- extendedWaitUntil:
    visible: ".*"
    timeout: 30000
- waitForAnimationToEnd

# Dismiss overlays
- tapOn:
    text: "Get Started"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Finish"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    text: "✕"
    optional: true
- waitForAnimationToEnd

# Tap Insights tab (2nd tab, ~30% from left)
- tapOn:
    point: "30%,97%"
- waitForAnimationToEnd

# Tap Budget tab (3rd tab, ~50% from left)
- tapOn:
    point: "50%,97%"
- waitForAnimationToEnd

# Tap Calendar tab (4th tab, ~70% from left)
- tapOn:
    point: "70%,97%"
- waitForAnimationToEnd

# Tap Settings tab (5th tab, ~90% from left)
- tapOn:
    point: "90%,97%"
- waitForAnimationToEnd

# Return to Home tab (1st tab, ~10% from left)
- tapOn:
    point: "10%,97%"
- waitForAnimationToEnd
