appId: host.exp.Exponent
---
# Test 04: Settings Screen

- openLink: "exp://127.0.0.1:8081"
- extendedWaitUntil:
    visible: ".*"
    timeout: 30000
- waitForAnimationToEnd

- tapOn:
    text: "Get Started"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Finish"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    text: "✕"
    optional: true
- waitForAnimationToEnd

# Tap Settings tab (5th tab)
- tapOn:
    point: "90%,97%"
- waitForAnimationToEnd

# Verify settings sections
- assertVisible:
    text: ".*[Tt]heme.*|.*[Aa]ppearance.*|.*PLAN.*"
    optional: true
- assertVisible:
    text: ".*[Cc]urrency.*|.*CLOUD.*"
    optional: true

- scroll
- waitForAnimationToEnd

- assertVisible:
    text: ".*[Bb]ackup.*|.*[Ee]xport.*|.*DATA.*"
    optional: true
