# Example YAML rules for Spotify
version: "1"
merchant:
  name: "Spotify"
  domain: "spotify.com"

patterns:
  - type: charge
    from_domain: "spotify.com"
    subject_patterns:
      - "Spotify.*receipt"
      - "payment.*received"
      - "Your Spotify.*payment"
    amount_regex: '\$(\d+\.?\d*)'
    confidence: 0.95

  - type: renewal
    from_domain: "spotify.com"
    subject_patterns:
      - "subscription.*renews"
      - "Premium.*renewed"
    confidence: 0.90

  - type: trial_end
    from_domain: "spotify.com"
    subject_patterns:
      - "trial.*ending"
      - "free trial.*ends"
    confidence: 0.90

defaults:
  cadence: monthly
  currency: USD
