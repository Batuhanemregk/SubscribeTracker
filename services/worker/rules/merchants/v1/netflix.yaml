# Example YAML rules for Netflix
version: "1"
merchant:
  name: "Netflix"
  domain: "netflix.com"

patterns:
  - type: charge
    from_domain: "netflix.com"
    subject_patterns:
      - "Your Netflix.*payment"
      - "Netflix.*receipt"
      - "payment.*processed"
      - "billing.*statement"
    amount_regex: '\$(\d+\.?\d*)'
    confidence: 0.95

  - type: renewal
    from_domain: "netflix.com"
    subject_patterns:
      - "membership.*renewed"
      - "subscription.*renewed"
      - "next billing"
    confidence: 0.90

  - type: cancellation
    from_domain: "netflix.com"
    subject_patterns:
      - "cancelled"
      - "cancellation.*confirmed"
    confidence: 0.95

defaults:
  cadence: monthly
  currency: USD
